version: 2

models:

  # ---------------------------------------------------------------------------
  - name: dim_funcionario
    description: >
      Dimensão de funcionários — combina admin e motoristas em uma única tabela.
      Inclui dados enriquecidos: idade, tempo de empresa, faixas categóricas.
    columns:
      - name: sk_funcionario
        description: "Chave surrogate única (hash de sistema_origem + funcionario_id)"
        tests: [unique, not_null]
      - name: status
        tests:
          - accepted_values:
              values: ['Ativo', 'Demitido']
      - name: sistema_origem
        tests:
          - accepted_values:
              values: ['admin', 'motoristas']

  # ---------------------------------------------------------------------------
  - name: dim_data
    description: >
      Dimensão de tempo com calendário completo de 2018 a 2027.
      Gerada diretamente pelo dbt (sem fonte OLTP).
    columns:
      - name: sk_data
        description: "Chave surrogate no formato YYYYMMDD"
        tests: [unique, not_null]

  # ---------------------------------------------------------------------------
  - name: fato_ponto
    description: >
      Fato principal do DW. Granularidade: 1 registro por funcionário por dia trabalhado.
      Contém métricas de horas trabalhadas, extras, atrasos.
    columns:
      - name: sk_fato_ponto
        description: "Chave surrogate da linha (hash de sk_funcionario + sk_data)"
        tests: [unique, not_null]
      - name: horas_trabalhadas
        tests: [not_null]
      - name: sk_funcionario
        tests:
          - not_null
          - relationships:
              to: ref('dim_funcionario')
              field: sk_funcionario
      - name: sk_data
        tests:
          - not_null
          - relationships:
              to: ref('dim_data')
              field: sk_data
