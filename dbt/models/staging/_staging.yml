version: 2

models:

  # ---------------------------------------------------------------------------
  - name: stg_admin__funcionarios
    description: >
      Funcionários administrativos (Mensalistas, Horistas e Estagiários).
    columns:
      - name: funcionario_id
        tests: [unique, not_null]
      - name: cpf
        tests: [unique, not_null]
      - name: sistema_origem
        tests:
          - not_null
          - accepted_values:
              values: ['admin']
      - name: status
        tests:
          - accepted_values:
              values: ['Ativo', 'Demitido']

  # ---------------------------------------------------------------------------
  - name: stg_admin__apontamentos
    description: "Registros brutos de entrada/saída do sistema administrativo."
    columns:
      - name: apontamento_id
        tests: [unique, not_null]
      - name: tipo
        tests:
          - accepted_values:
              values: ['Entrada', 'Saída']

  # ---------------------------------------------------------------------------
  - name: stg_motoristas__funcionarios
    description: >
      Motoristas da área de Logística.
    columns:
      - name: funcionario_id
        tests: [unique, not_null]
      - name: cpf
        tests: [unique, not_null]
      - name: sistema_origem
        tests:
          - accepted_values:
              values: ['motoristas']

  # ---------------------------------------------------------------------------
  - name: stg_motoristas__apontamentos
    description: "Registros de ponto dos motoristas."
    columns:
      - name: apontamento_id
        tests: [unique, not_null]
      - name: tipo
        tests:
          - accepted_values:
              values: ['Entrada', 'Saída']
