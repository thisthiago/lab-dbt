version: 2

sources:

  # ---------------------------------------------------------------------------
  # FONTE: Sistema Administrativo (db_admin via postgres_fdw)
  # ---------------------------------------------------------------------------
  - name: admin
    description: >
      Sistema de Ponto Eletrônico para funcionários administrativos e estagiários.
    database: db_dw
    schema: raw_admin
    tables:
      - name: funcionario
        description: >
          Cadastro de funcionários administrativos (Mensalistas, Horistas e Estagiários).
        columns:
          - name: id
            tests: [unique, not_null]
          - name: cpf
            tests: [unique, not_null]
          - name: status
            tests:
              - accepted_values:
                  values: ['Ativo', 'Demitido']

      - name: apontamento
        description: "Registros brutos de bate-ponto (entrada e saída)."
        columns:
          - name: id
            tests: [unique, not_null]
          - name: tipo
            tests:
              - accepted_values:
                  values: ['Entrada', 'Saída']

  # ---------------------------------------------------------------------------
  # FONTE: Sistema de Motoristas (db_motoristas via postgres_fdw)
  # ---------------------------------------------------------------------------
  - name: motoristas
    description: >
      Sistema de Ponto Eletrônico exclusivo para motoristas da área de Logística.
    database: db_dw
    schema: raw_motoristas
    tables:
      - name: funcionario
        description: >
          Cadastro de motoristas.
        columns:
          - name: id
            tests: [unique, not_null]
          - name: cpf
            tests: [unique, not_null]
          - name: status
            tests:
              - accepted_values:
                  values: ['Ativo', 'Demitido']

      - name: apontamento
        description: "Registros de ponto dos motoristas"
        columns:
          - name: id
            tests: [unique, not_null]
          - name: tipo
            tests:
              - accepted_values:
                  values: ['Entrada', 'Saída']
