version: 2

models:

  - name: analytic_horas_mensais
    description: >
      Consolidação mensal de horas trabalhadas por funcionário.
      Inclui saldo de horas (positivo = banco de horas; negativo = débito).

  - name: analytic_absenteismo_departamento
    description: >
      Taxa de absenteísmo por departamento e mês.
      Compara dias de presença com dias úteis possíveis para calcular a taxa.

  - name: vw_funcionarios_anonimizados
    description: >
      View com dados de funcionários anonimizados conforme LGPD.
      CPF substituído por hash SHA-256 e nome mascarado.
    columns:
      - name: cpf_hash_sha256
      - name: nome_anonimizado
